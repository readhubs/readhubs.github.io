<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>ReadHubs - Read 300 Books Free Online</title>
    <meta name="description" content="ReadHubs is a free digital library with 300 books on self-help, productivity, finance, health, mindfulness, and more. No sign-up. No cost. Read now." />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://readhubs.github.io/" />

    <!-- Open Graph -->
    <meta property="og:title" content="ReadHubs - Read 300 Books Free Online" />
    <meta property="og:description" content="Free digital library with 300 books on self-help, productivity, finance, health, and more. No sign-up required." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://readhubs.github.io/" />
    <meta property="og:site_name" content="ReadHubs" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ReadHubs - Read 300 Books Free Online" />
    <meta name="twitter:description" content="Free digital library with 300 books on self-help, productivity, finance, health, and more." />

    <!-- hreflang -->
    <link rel="alternate" hreflang="en" href="https://readhubs.github.io/" />
    <link rel="alternate" hreflang="es" href="https://readhubs.github.io/es" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#f59e0b" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="ReadHubs" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Merriweather:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />

    <!-- Schema.org WebSite -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "ReadHubs",
      "url": "https://readhubs.github.io/",
      "description": "Free digital library with 300 books on self-help, productivity, finance, health, mindfulness, and more.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://readhubs.github.io/search?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- MONETAG_PUSH_NOTIFICATION -->
    <!-- Replace the comment below with your Monetag push notification code when approved -->
    <!-- <script src="https://your-monetag-push-code.js"></script> -->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
