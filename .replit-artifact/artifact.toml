kind = "web"
previewPath = "/"
title = "ReadHubs - Free Book Library"
version = "1.0.0"
id = "artifacts/readhubs"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23365

[services.development]
run = "pnpm --filter @workspace/readhubs run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/readhubs", "run", "build" ]
publicDir = "artifacts/readhubs/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23365"
BASE_PATH = "/"
